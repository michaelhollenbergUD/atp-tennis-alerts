name: ATP Tennis Monitor

on:
  workflow_dispatch:

jobs:
  check-tennis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Check for tennis matches
      run: |
        API_KEY="${{ secrets.ODDS_API_KEY }}"
        
        echo "Fetching available sports..."
        curl -s "https://api.the-odds-api.com/v4/sports/?apiKey=$API_KEY" > sports_list.json
        
        echo "Fetching Miami Open matches..."
        curl -s "https://api.the-odds-api.com/v4/sports/tennis_atp_miami_open/odds/?apiKey=$API_KEY&regions=us&markets=h2h" > matches.json
        
        touch alerted_matches.txt
        
        python3 << 'PYEND'
import json
import os
import urllib.request
from datetime import datetime, timezone

# Show available tennis sports
print("\nAvailable tennis tournaments:")
try:
    with open('sports_list.json', 'r') as f:
        sports = json.load(f)
    for sport in sports:
        if 'tennis' in sport.get('key', '').lower() and sport.get('active'):
            print(f"  {sport['key']} - {sport.get('title')}")
except Exception as e:
    print(f"Error reading sports: {e}")

# Read matches
with open('matches.json', 'r') as f:
    data = json.load(f)

# Read alerted matches
alerted_matches = set()
try:
    with open('alerted_matches.txt', 'r') as f:
        content = f.read().strip()
        if content:
            alerted_matches = set(content.split(','))
except:
    pass

current_date = datetime.now().strftime('%Y%m%d')
alerted_matches = {m for m in alerted_matches if m.startswith(current_date)}

starting_soon_matches = []

print(f"\nAPI Response: {type(data)}")

if isinstance(data, dict) and 'message' in data:
    print(f"API Error: {data.get('message')}")
elif isinstance(data, list):
    print(f"Total matches found: {len(data)}")
    
    for event in data:
        try:
            match_id = event.get('id', '')
            home_team = event.get('home_team', '')
            away_team = event.get('away_team', '')
            commence_time = event.get('commence_time', '')
            
            print(f"  {home_team} vs {away_team} (Start: {commence_time})")
            
            starting_key = f"{current_date}_{match_id}_starting"
            
            if commence_time and starting_key not in alerted_matches:
                match_start = datetime.fromisoformat(commence_time.replace('Z', '+00:00'))
                current_time_utc = datetime.now(timezone.utc)
                minutes_until = int((match_start - current_time_utc).total_seconds() / 60)
                
                if 0 <= minutes_until <= 20:
                    starting_soon_matches.append({
                        'player1': home_team,
                        'player2': away_team,
                        'minutes_until': minutes_until
                    })
                    alerted_matches.add(starting_key)
                    print(f"    → Alert queued!")
        except Exception as e:
            print(f"  Error: {e}")

webhook_url = os.environ.get('SLACK_WEBHOOK_URL')

if starting_soon_matches and webhook_url:
    for match in starting_soon_matches:
        slack_message = {
            "text": f"🎾 MATCH STARTING: {match['player1']} vs {match['player2']} in ~{match['minutes_until']} minutes",
            "blocks": [
                {
                    "type": "header",
                    "text": {
                        "type": "plain_text",
                        "text": "🎾 MATCH STARTING SOON",
                        "emoji": True
                    }
                },
                {
                    "type": "section",
                    "text": {
                        "type": "mrkdwn",
                        "text": f"*{match['player1']}* vs *{match['player2']}*"
                    }
                },
                {
                    "type": "context",
                    "elements": [
                        {
                            "type": "mrkdwn",
                            "text": f"⏰ Starting in ~{match['minutes_until']} minutes"
                        }
                    ]
                }
            ]
        }
        
        req = urllib.request.Request(
            webhook_url,
            data=json.dumps(slack_message).encode('utf-8'),
            headers={'Content-Type': 'application/json'}
        )
        
        try:
            with urllib.request.urlopen(req) as response:
                print(f"✓ Sent: {match['player1']} vs {match['player2']}")
        except Exception as e:
            print(f"✗ Error: {e}")
else:
    print("\nNo new match alerts.")

with open('alerted_matches.txt', 'w') as f:
    f.write(','.join(sorted(alerted_matches)))

print(f"Alerted matches today: {len(alerted_matches)}")
PYEND
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    
    - name: Commit state file
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add alerted_matches.txt || true
        git commit -m "Update alerted matches state [skip ci]" || true
        git push || true
